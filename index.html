<style amp-custom>
    * {

    }

    body {
        font-family: monospace;
        position: relative;
        background: #000000;
        background-image: radial-gradient(#1a1a1a 5%, #000000 50%);
        background-size: 5px 5px;
        background-attachment: fixed;
    }

    .container {
        max-width: 400px;
        height: 100vh;
        margin: 0 auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;

        white-space: nowrap;
        letter-spacing: .09em;
        animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
        from { width: 0 }
        to { width: 100% }
    }

    @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: #c0c0c0; }
    }

    .stage-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #2c2c2c 0%, #000000 100%);
        z-index: -1;
        overflow: hidden;
    }

    .beam {
        position: absolute;
        top: -20%;
        width: 300px;
        height: 150%;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.12), transparent);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        filter: blur(30px);
        opacity: 0.6;
        animation: beamMove 8s infinite alternate ease-in-out;
    }

    .beam-left { left: -10%; transform-origin: top; }
    .beam-right { right: -10%; transform-origin: top; animation-delay: -4s; }

    .dust {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(#ffffff 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.1;
        animation: dustFly 20s linear infinite;
    }

    h1 {
        font-size: 1.5rem;
        background: linear-gradient(45deg, #a0a0a0, #ffffff, #a0a0a0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
        text-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        margin: 20px 0;
    }

    .banner {
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(192, 192, 192, 0.25);
        border: 1px solid rgba(192, 192, 192, 0.2);
        transition: 0.5s;
    }

    .banner:hover {
        transform: scale(1.02);
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
    }

    .btn-login {
        display: block;
        padding: 10px;
        color: #ffffff;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        text-align: center;
        background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
        margin-top: 10px;
        border-radius: 10px;
        position: relative;
        z-index: 2;
        box-shadow: 0 0 12px rgba(192, 192, 192, 0.4);
        border: 1px solid #c0c0c0;
        transition: 0.3s;
    }

    .btn-login:hover {
        color: #ffffff;
        border-color: #ffffff;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        transform: translateY(-2px);
    }

    .btn-daftar {
        display: block;
        width: 80%;
        margin: 15px auto;
        padding: 15px;
        text-decoration: none;
        font-weight: 900;
        font-size: 1.1rem;
        border-radius: 50px;
        text-align: center;
        position: relative;
        overflow: hidden;
        color: #ffffff;
        background: #111111;
        border: none;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .btn-daftar::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(transparent, #ffffff, #a8a8a8, transparent 30%);
        animation: rotate-border 3s linear infinite;
        z-index: 1;
    }

    .btn-daftar::after {
        content: '';
        position: absolute;
        inset: 3px;
        background: #1a1a1a;
        border-radius: 50px;
        z-index: 2;
        transition: 0.3s;
    }

    .btn-daftar span {
        position: relative;
        z-index: 5;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
    }

    .btn-daftar:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(192, 192, 192, 0.4);
        color: #ffffff;
    }

    .btn-daftar:hover::after {
        background: #252525;
    }

    #logo-premium {
        transition: transform 0.3s ease, filter 0.3s ease;
    }

    #logo-premium:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
    }

    .copyright {
        text-align: center;
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.8rem;
        margin-top: 30px;
    }

    @keyframes beamMove {
        from { transform: rotate(-15deg); }
        to { transform: rotate(15deg); }
    }

    @keyframes dustFly {
        from { transform: translateY(0); }
        to { transform: translateY(-1000px); }
    }

    @keyframes rotate-border {
        100% { transform: rotate(360deg); }
    }
</style>
